name: Deploy Certificados

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-certificados-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_PATH: ${{ vars.VPS_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deploy tools
        run: sudo apt-get update && sudo apt-get install -y openssh-client rsync

      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Sync application files
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          APP_DIR="${VPS_PATH:-/var/www/Cuidado-Integral-Api/certificados}"
          ssh -i ~/.ssh/id_ed25519 -p "$PORT" "$VPS_USER@$VPS_HOST" "mkdir -p '$APP_DIR'"
          rsync -az --delete \
            --filter='P .env' \
            --filter='P public/qrcodes/***' \
            --exclude '.env' \
            --exclude 'vendor/' \
            --exclude 'public/qrcodes/' \
            -e "ssh -i ~/.ssh/id_ed25519 -p $PORT" \
            certificados/ "$VPS_USER@$VPS_HOST:$APP_DIR/"

      - name: Run remote deploy script
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          APP_DIR="${VPS_PATH:-/var/www/Cuidado-Integral-Api/certificados}"
          ssh -i ~/.ssh/id_ed25519 -p "$PORT" "$VPS_USER@$VPS_HOST" \
            "chmod +x '$APP_DIR/deploy/vps/deploy.sh' && bash '$APP_DIR/deploy/vps/deploy.sh' '$APP_DIR'"
