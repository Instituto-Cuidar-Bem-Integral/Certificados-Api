server {
    listen 80;
    listen [::]:80;
    server_name 187.77.254.115;

    root /var/www/Cuidado-Integral-Api;
    index index.html;

    client_max_body_size 10M;

    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /public/qrcodes/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location ~ ^/(config|src|vendor|sql|\.git)/ {
        deny all;
    }

    location ~ ^/(composer\.(json|lock)|READ\.ME|\.env|\.env\.example)$ {
        deny all;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }
}
