<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Certificados - Instituto Cuidar Bem</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        header h1 {
            color: white;
            font-size: 2rem;
            margin-bottom: 5px;
        }

        header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .nav-btn:hover,
        .nav-btn.active {
            background: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        main {
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        #content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            min-height: 500px;
        }

        footer {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 40px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                align-items: center;
            }

            #content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🎓 Sistema de Certificados</h1>
        <p>Instituto Cuidar Bem</p>
        
        <nav>
            <button class="nav-btn active" onclick="loadPage('home')">📋 Menu</button>
            <button class="nav-btn" onclick="loadPage('cadastrar')">📝 Cadastrar</button>
            <button class="nav-btn" onclick="loadPage('listar')">📄 Listar</button>
            <button class="nav-btn" onclick="loadPage('validar')">✅ Validar</button>
        </nav>
    </header>

    <main>
        <div id="content">
            <div class="loading">Carregando...</div>
        </div>
    </main>

    <footer>
        <p>© 2026 Instituto Cuidar Bem - Todos os direitos reservados</p>
    </footer>

    <script>
        // Carregar página inicial
        document.addEventListener('DOMContentLoaded', () => loadPage('home'));

        async function loadPage(page) {
            // Atualizar botões ativos
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading">Carregando...</div>';

            try {
                let html = '';
                
                switch(page) {
                    case 'home':
                        html = getHomePage();
                        break;
                    case 'cadastrar':
                        html = await fetch('pages/cadastrar.php').then(r => r.text());
                        break;
                    case 'listar':
                        html = await fetch('pages/listar.php').then(r => r.text());
                        break;
                    case 'validar':
                        html = await fetch('pages/validar.php').then(r => r.text());
                        break;
                }
                
                content.innerHTML = html;
                
                // Executar scripts da página carregada
                executeScripts(content);
                
            } catch (error) {
                content.innerHTML = `<div class="loading">❌ Erro ao carregar: ${error.message}</div>`;
            }
        }

        function getHomePage() {
            return `
                <div style="text-align: center;">
                    <h2 style="color: #333; margin-bottom: 30px;">📋 Menu Principal</h2>
                    
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                        <div onclick="loadPage('cadastrar')" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 30px; border-radius: 15px; cursor: pointer; transition: transform 0.3s ease;" onmouseover="this.style.transform='translateY(-5px)'" onmouseout="this.style.transform='translateY(0)'">
                            <div style="font-size: 3rem; margin-bottom: 10px;">📝</div>
                            <h3 style="color: white; margin-bottom: 5px;">Cadastrar</h3>
                            <p style="color: rgba(255,255,255,0.8);">Novo certificado</p>
                        </div>

                        <div onclick="loadPage('listar')" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 30px; border-radius: 15px; cursor: pointer; transition: transform 0.3s ease;" onmouseover="this.style.transform='translateY(-5px)'" onmouseout="this.style.transform='translateY(0)'">
                            <div style="font-size: 3rem; margin-bottom: 10px;">📄</div>
                            <h3 style="color: white; margin-bottom: 5px;">Listar</h3>
                            <p style="color: rgba(255,255,255,0.8);">Ver certificados</p>
                        </div>

                        <div onclick="loadPage('validar')" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 30px; border-radius: 15px; cursor: pointer; transition: transform 0.3s ease;" onmouseover="this.style.transform='translateY(-5px)'" onmouseout="this.style.transform='translateY(0)'">
                            <div style="font-size: 3rem; margin-bottom: 10px;">✅</div>
                            <h3 style="color: white; margin-bottom: 5px;">Validar</h3>
                            <p style="color: rgba(255,255,255,0.8);">Verificar certificado</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function executeScripts(container) {
            const scripts = container.querySelectorAll('script');
            scripts.forEach(script => {
                const newScript = document.createElement('script');
                newScript.textContent = script.textContent;
                document.body.appendChild(newScript);
            });
        }
    </script>
</body>
</html>
